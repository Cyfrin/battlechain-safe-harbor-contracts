[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    '@openzeppelin/contracts=lib/openzeppelin-contracts/contracts',
    '@openzeppelin/contracts-upgradeable=lib/openzeppelin-contracts-upgradeable/contracts',
    'createx/=lib/createx/src/',
    'l2-contracts/=lib/battlechain-contracts/l2-contracts/contracts/',
    'l1-contracts/=lib/battlechain-contracts/l1-contracts/contracts/',
    'system-contracts/=lib/battlechain-contracts/system-contracts/contracts/',
    '@solady=lib/solady/src/',
]
ignored_error_codes = [2394, 4591]
ignored_warnings_from = ["test", "script", "lib"]
optimizer = true
# Needs to be small for AgreementFactory.sol (and therefore, agreement.sol)
optimizer_runs = 2
# Required to fit AgreementFactory under the EIP-170 size limit at optimizer_runs = 2
via_ir = true

# Do not use in production
[profile.solx]
# Path to a locally installed solx binary
solc_version = "/usr/local/bin/solx"

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true

[lint]
exclude_lints = ["mixed-case-variable"]
ignore = ["test/**/*", "src/CreateX.sol", "lib/**/*"]

[invariant]
runs = 100
depth = 50
fail_on_revert = false

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
